name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # 🐧 Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: wormhole
            asset_name: wormhole-linux-x86_64

          # 🪟 Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: wormhole.exe
            asset_name: wormhole-windows-x86_64.exe

          # 🍎 macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: wormhole
            asset_name: wormhole-macos-x86_64

          # 🍎 macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: wormhole
            asset_name: wormhole-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
